<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Корзина</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#fff8f2;font-family:Arial;}

.box{
max-width:800px;
margin:40px auto;
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="box">
<h2>🛒 Корзина</h2>
<div id="list"></div>
<h4 class="mt-3">Итого: <span id="total">0</span> AZN</h4>
</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let list=document.getElementById("list");
let total=0;

cart.forEach(i=>{
total+=i.price;
list.innerHTML+=`<div>${i.name} - ${i.price} AZN</div>`;
});

document.getElementById("total").innerText=total;

</script>

</body>
</html>
