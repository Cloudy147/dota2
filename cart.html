<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Корзина</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark p-3">
<div class="container">
<a class="navbar-brand" href="index.html">🍰 Bakery</a>

<div>
<a class="btn btn-outline-light" href="catalog.html">Меню</a>
</div>
</div>
</nav>

<div class="container mt-4">

<h2>🛒 Корзина</h2>

<div id="cart"></div>

<h4 id="total">0 AZN</h4>

<select id="pay" class="form-select w-50">
<option value="cash">Наличные</option>
<option value="card">Карта</option>
<option value="online">Онлайн</option>
</select>

<button class="btn btn-success mt-3" onclick="checkout()">Оформить</button>
<button class="btn btn-danger mt-3" onclick="clearCart()">Очистить</button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

function render(){

let box=document.getElementById("cart");
box.innerHTML="";

let total=0;

if(cart.length===0){
box.innerHTML="Пусто";
return;
}

cart.forEach((i,idx)=>{
total += i.price*i.qty;

box.innerHTML += `
<div class="item">
<div>${i.name}<br>${i.price} AZN × ${i.qty}</div>
<div>
<button onclick="plus(${idx})">+</button>
<button onclick="minus(${idx})">-</button>
<button onclick="del(${idx})">x</button>
</div>
</div>`;
});

document.getElementById("total").innerText="Итого: "+total+" AZN";
}

function plus(i){cart[i].qty++;save();}
function minus(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);save();}
function del(i){cart.splice(i,1);save();}
function clearCart(){cart=[];save();}

function checkout(){

if(cart.length===0)return alert("Пусто");

let pay=document.getElementById("pay").value;
let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

alert("Заказ оформлен\nОплата: "+pay+"\nСумма: "+total);

cart=[];
save();
}

render();
</script>

</body>
</html>
