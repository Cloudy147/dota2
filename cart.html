<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Корзина</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-bottom:1px solid #eee;
}

.remove{
    transition:0.3s;
}

.fade-out{
    opacity:0;
    transform:translateX(50px);
}

.total-box{
    font-size:20px;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
<a class="navbar-brand" href="index.html">🍰 Bakery</a>

<div>
<a class="btn btn-outline-light" href="index.html">Главная</a>
<a class="btn btn-outline-light" href="catalog.html">Меню</a>
<a class="btn btn-outline-light" href="about.html">О нас</a>
<a class="btn btn-warning" href="cart.html">🛒</a>
</div>
</div>
</nav>

<div class="box">

<h2>🛒 Корзина</h2>

<div id="cartItems"></div>

<div class="total-box">
Итого: <span id="total">0</span> AZN
</div>

<button class="btn btn-danger mt-3" onclick="clearCart()">Очистить корзину</button>

</div>

<script>

// 🧠 безопасная корзина (удаляет старые данные)
function getCart(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// удаляем старые товары от одежды (если были)
cart = cart.filter(i => i.name && i.price && i.img);

return cart;
}

function saveCart(cart){
localStorage.setItem("cart", JSON.stringify(cart));
}

function render(){

let cart = getCart();
let box = document.getElementById("cartItems");
box.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{
total += Number(item.price);

box.innerHTML += `
<div class="item" id="item-${index}">
<div>
<strong>${item.name}</strong><br>
${item.price} AZN
</div>

<button class="btn btn-sm btn-danger" onclick="removeItem(${index})">
❌
</button>
</div>
`;
});

document.getElementById("total").innerText = total;
}

function removeItem(i){

let cart = getCart();

let el = document.getElementById("item-"+i);
el.classList.add("fade-out");

setTimeout(()=>{
cart.splice(i,1);
saveCart(cart);
render();
},300);
}

function clearCart(){
localStorage.removeItem("cart");
render();
}

render();

</script>

</body>
</html>
