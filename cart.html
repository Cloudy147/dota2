<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Корзина</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.item {
    display:flex;
    justify-content:space-between;
    align-items:center;
}
</style>
</head>

<body class="p-4">

<div class="container">

<h2 class="mb-4">🛒 Ваша корзина</h2>

<div id="cart"></div>

<hr>

<h4 id="total">Итого: 0 AZN</h4>

<button class="btn btn-danger mt-3" onclick="clearCart()">
Очистить корзину
</button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render() {
    let box = document.getElementById("cart");
    box.innerHTML = "";

    let total = 0;

    if (cart.length === 0) {
        box.innerHTML = "<p>Корзина пустая 😕</p>";
        document.getElementById("total").innerText = "Итого: 0 AZN";
        return;
    }

    cart.forEach((item, index) => {
        total += item.price;

        box.innerHTML += `
            <div class="border p-3 mb-2 item">
                <div>
                    <b>${item.name}</b><br>
                    ${item.price} AZN
                </div>

                <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${index})">
                    Удалить
                </button>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Итого: " + total + " AZN";
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    render();
}

function clearCart() {
    cart = [];
    localStorage.removeItem("cart");
    render();
}

render();
</script>

</body>
</html>
