<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Меню</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#fff8f2;font-family:Arial;}

.card{
    border:none;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.card img{height:240px;object-fit:cover;}

.fly{
    position:fixed;
    width:50px;
    height:50px;
    border-radius:10px;
    z-index:9999;
    transition:0.8s;
}

.cart-bounce{animation:bounce 0.4s;}

@keyframes bounce{
    0%{transform:scale(1);}
    50%{transform:scale(1.4);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">🍰 Bakery</a>

<div>
<a class="btn btn-outline-light" href="index.html">Главная</a>
<a class="btn btn-outline-light" href="catalog.html">Меню</a>
<a class="btn btn-outline-light" href="about.html">О нас</a>
<a class="btn btn-warning" href="cart.html">🛒</a>
</div>

</div>
</nav>

<div class="container mt-4">
<div class="row">

<!-- ITEM -->
<div class="col-md-4 mb-4">
<div class="card">
<img src="https://images.unsplash.com/photo-1542826438-bd32f43d626f">
<div class="p-3 text-center">
<h5>Шоколадный торт</h5>
<p>12 AZN</p>
<button class="btn btn-success"
onclick="add('Шоколадный торт',12,this,'https://images.unsplash.com/photo-1542826438-bd32f43d626f')">
В корзину
</button>
</div>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card">
<img src="https://images.unsplash.com/photo-1509440159596-0249088772ff">
<div class="p-3 text-center">
<h5>Круассан</h5>
<p>6 AZN</p>
<button class="btn btn-success"
onclick="add('Круассан',6,this,'https://images.unsplash.com/photo-1509440159596-0249088772ff')">
В корзину
</button>
</div>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card">
<img src="https://images.unsplash.com/photo-1514516870926-206e8e4c6c0f">
<div class="p-3 text-center">
<h5>Чизкейк</h5>
<p>10 AZN</p>
<button class="btn btn-success"
onclick="add('Чизкейк',10,this,'https://images.unsplash.com/photo-1514516870926-206e8e4c6c0f')">
В корзину
</button>
</div>
</div>
</div>

</div>
</div>

<script>

function getCart(){
return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(c){
localStorage.setItem("cart",JSON.stringify(c));
}

function add(name,price,btn,img){

let cart=getCart();
cart.push({name,price,img});
saveCart(cart);

const start=btn.getBoundingClientRect();
const fly=document.createElement("img");

fly.src=img;
fly.className="fly";
document.body.appendChild(fly);

fly.style.left=start.left+"px";
fly.style.top=start.top+"px";

const end=document.querySelector(".btn-warning").getBoundingClientRect();

requestAnimationFrame(()=>{
fly.style.transform=`translate(${end.left-start.left}px,${end.top-start.top}px) scale(0.2)`;
fly.style.opacity="0";
});

setTimeout(()=>fly.remove(),800);

document.querySelector(".btn-warning").classList.add("cart-bounce");
setTimeout(()=>document.querySelector(".btn-warning").classList.remove("cart-bounce"),400);
}

</script>

</body>
</html>
