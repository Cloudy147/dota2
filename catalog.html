<script>
function filter(type){
let items=document.querySelectorAll(".product");

items.forEach(el=>{
if(type==="all"){
el.classList.remove("hidden");
}else{
el.classList.contains(type)
? el.classList.remove("hidden")
: el.classList.add("hidden");
}
});
}
</script>
