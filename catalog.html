<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

</head>

<body>

<nav class="navbar navbar-dark bg-dark p-3">
<div class="container">
<a class="navbar-brand" href="index.html">🍰 Bakery</a>

<div>
<a class="btn btn-outline-light" href="index.html">Главная</a>
<a class="btn btn-warning" href="cart.html">🛒</a>
</div>
</div>
</nav>

<div class="container mt-4">
<div class="row">

<!-- 1-8 -->
<script>
const items = [
["Шоколадный торт",12,1,"cake"],
["Чизкейк",10,2,"cake"],
["Клубничный торт",14,3,"cake"],
["Булочка с корицей",5,4,"bakery"],
["Хлеб",4,5,"bakery"],
["Багет",3,6,"bakery"],
["Эклер",7,7,"sweet"],
["Пончик",5,8,"sweet"]
];
</script>

<script>
document.write(items.map(i=>`
<div class="col-md-3 mb-4 product ${i[3]}">
<div class="card">
<img src="${i[2]}.jpg">
<div class="p-2 text-center">
<h5>${i[0]}</h5>
<p>${i[1]} AZN</p>
<button class="btn btn-success" onclick="add('${i[0]}',${i[1]})">В корзину</button>
</div>
</div>
</div>
`).join(""));
</script>

</div>
</div>

<script>
function filter(type){
document.querySelectorAll(".product").forEach(el=>{
el.classList.toggle("hidden", type!=="all" && !el.classList.contains(type));
});
}
</script>

<script src="script.js"></script>

</body>
