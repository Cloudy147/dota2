<!DOCTYPE html>
<html lang="ru">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#fafafa; }

.filter-btn{
    margin:5px;
    border-radius:10px;
}

.hidden{display:none !important;}

.card img{
    height:220px;
    object-fit:cover;

</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">🍰 Bakery Shop</a>

<div>
<a class="btn btn-outline-light" href="index.html">Главная</a>
<a class="btn btn-warning" href="cart.html">🛒 Корзина</a>
</div>

</div>

<!-- FILTER -->
<div class="container text-center mt-4">

<button class="btn btn-dark filter-btn" onclick="filter('all')">Все</button>

<button class="btn btn-outline-dark filter-btn" onclick="filter('bakery')">Выпечка</button>
<button class="btn btn-outline-dark filter-btn" onclick="filter('pastry')">Пирожные</button>
<button class="btn btn-outline-dark filter-btn" onclick="filter('sweet')">Сладости</button>

</div>

<script>
function filter(type){
let items=document.querySelectorAll(".product");

items.forEach(el=>{
if(type==="all"){
el.classList.remove("hidden");
}else{
el.classList.contains(type)
? el.classList.remove("hidden")
: el.classList.add("hidden");
}
});
}
</script>

<script src="script.js"></script>
